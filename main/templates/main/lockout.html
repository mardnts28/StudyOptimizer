{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Locked - StudyOptimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-white via-red-50/30 to-orange-50/20 flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-md text-center">
        <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="lock" class="w-12 h-12 text-red-600"></i>
        </div>
        <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Account Locked</h1>
        <p class="text-gray-600 font-medium mb-8">
            Due to multiple failed login attempts, your account has been temporarily locked to protect its security. 
            Please try again later.
        </p>
        <a href="/" class="bg-gray-900 text-white font-bold py-4 px-8 rounded-2xl shadow-lg hover:bg-gray-800 transition-all inline-flex items-center gap-2">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> Back Home
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
